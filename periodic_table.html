<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid currentColor;
    cursor: pointer;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: transparent;
    transition: all 0.2s;
    opacity: 0.5;
  }
  .filter-btn:hover, .filter-btn.active { opacity: 1; background: rgba(255,255,255,0.08); }
  .filter-btn.all-btn { color: #fff; border-color: #fff; }

  .table-wrap { overflow-x: auto; }
  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(44px, 1fr));
    gap: 3px;
    min-width: 820px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
  }
  .cell:not(.spacer):not(.label):hover {
    transform: scale(1.2);
    z-index: 10;
    box-shadow: 0 0 16px 4px rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6) !important;
  }
  .cell.faded { opacity: 0.1; }

  .cell .num { font-size: 0.42rem; color: rgba(255,255,255,0.5); align-self: flex-start; padding: 2px 3px 0; line-height:1; }
  .cell .sym { font-size: 1.1rem; font-weight: 800; line-height: 1.1; }
  .cell .name { font-size: 0.33rem; color: rgba(255,255,255,0.6); text-align: center; padding: 0 2px; white-space: nowrap; overflow: hidden; max-width: 100%; }
  .cell .mass { font-size: 0.32rem; color: rgba(255,255,255,0.4); }

  .spacer { background: transparent !important; border: none !important; cursor: default; }
  .spacer:hover { transform: none !important; box-shadow: none !important; }

  .label {
    background: transparent !important;
    border: none !important;
    cursor: default;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; font-weight: 700;
  }
  .label:hover { transform: none !important; box-shadow: none !important; }

  .sep-row .cell { height: 8px; min-height: 8px; aspect-ratio: unset; background: transparent !important; border: none !important; }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1a1d27;
    border: 2px solid #444;
    border-radius: 18px;
    padding: 30px 36px;
    max-width: 380px; width: 92%;
    position: relative;
    box-shadow: 0 12px 50px rgba(0,0,0,0.7);
    animation: popIn 0.18s ease;
  }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; color: #888;
    font-size: 1.5rem; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: #fff; }
  .modal-sym { font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .modal-name { font-size: 1.5rem; font-weight: 700; }
  .modal-cat { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.55; margin-bottom: 18px; margin-top: 2px; }
  .modal-props { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .prop { background: #0f1117; border-radius: 10px; padding: 10px 14px; }
  .prop .lbl { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.45; }
  .prop .val { font-size: 1rem; font-weight: 700; margin-top: 3px; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-top: 14px;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: #aaa; }
  .leg-sw { width: 13px; height: 13px; border-radius: 4px; }
</style>
</head>

function makeCell(el) {
  const [num,sym,name,mass,cat,period,group,phase,config] = el;
  const c = CATS[cat];
  const div = document.createElement('div');
  div.className = 'cell';
  div.dataset.cat = cat;
  div.style.background = c.color + '28';
  div.style.borderColor = c.color + '50';
  div.innerHTML = `
    <span class="num">${num}</span>
    <span class="sym" style="color:${c.color}">${sym}</span>
    <span class="name">${name}</span>
    <span class="mass">${parseFloat(mass).toFixed(1)}</span>
  `;
  div.addEventListener('click', () => openModal(el));
  return div;
}

function makeSpace() {
  const div = document.createElement('div');
  div.className = 'cell spacer';
  return div;
}

function buildGrid() {
  for (let row = 1; row <= 10; row++) {
    if (row === 8) {
      // Thin separator
      for (let col = 1; col <= 18; col++) {
        const sp = document.createElement('div');
        sp.className = 'cell spacer';
        sp.style.height = '10px';
        sp.style.minHeight = '10px';
        sp.style.aspectRatio = 'unset';
        grid.appendChild(sp);
      }
      continue;
    }
    for (let col = 1; col <= 18; col++) {
      const key = `${row}-${col}`;

      // Lanthanide/Actinide labels
      if ((row === 9 || row === 10) && col === 1) {
        const lbl = document.createElement('div');
        lbl.className = 'cell label';
        lbl.style.gridColumn = 'span 3';
        const isLan = row === 9;
        lbl.style.color = isLan ? CATS.lanthanide.color : CATS.actinide.color;
        lbl.innerHTML = `<span style="writing-mode:horizontal-tb;font-size:0.6rem">${isLan?'Lantha-\nnides':'Acti-\nnides'}</span>`;
        grid.appendChild(lbl);
        col = 3;
        continue;
      }

      // La/Ac placeholder in main table
      if ((row === 6 || row === 7) && col === 3) {
        const ph = document.createElement('div');
        ph.className = 'cell spacer';
        ph.style.border = `1.5px dashed ${row===6?CATS.lanthanide.color:CATS.actinide.color}55`;
        ph.style.background = (row===6?CATS.lanthanide.color:CATS.actinide.color) + '10';
        const txt = document.createElement('span');
        txt.style.cssText = 'font-size:0.4rem;color:#555;text-align:center;padding:2px';
        txt.textContent = row===6?'57–71':'89–103';
        ph.appendChild(txt);
        grid.appendChild(ph);
        continue;
      }

      const el = posMap[key];
      if (el) {
        grid.appendChild(makeCell(el));
      } else {
        grid.appendChild(makeSpace());
      }
    }
  }
}

function openModal(el) {
  const [num,sym,name,mass,cat,period,group,phase,config] = el;
  const c = CATS[cat];
  document.getElementById('mSym').textContent = sym;
  document.getElementById('mSym').style.color = c.color;
  document.getElementById('mName').textContent = name;
  document.getElementById('mCat').textContent = c.label;
  document.getElementById('mNum').textContent = num;
  document.getElementById('mMass').textContent = mass + ' u';
  document.getElementById('mPeriod').textContent = period;
  document.getElementById('mGroup').textContent = group <= 18 ? group : '—';
  document.getElementById('mPhase').textContent = phase;
  document.getElementById('mConfig').textContent = config;
  document.getElementById('modal').style.borderColor = c.color;
  document.getElementById('modalBg').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalBg').classList.remove('open'));
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open');
});

function buildFilters() {
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn all-btn active';
  allBtn.textContent = 'All Elements';
  allBtn.addEventListener('click', () => {
    setFilter('all', allBtn);
  });
  filtersDiv.appendChild(allBtn);

  Object.entries(CATS).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = val.label;
    btn.style.color = val.color;
    btn.addEventListener('click', () => setFilter(key, btn));
    filtersDiv.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cell[data-cat]').forEach(c => {
    if (cat === 'all' || c.dataset.cat === cat) {
      c.classList.remove('faded');
    } else {
      c.classList.add('faded');
    }
  });
}

function buildLegend() {
  Object.entries(CATS).forEach(([key, val]) => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-sw" style="background:${val.color}"></div><span>${val.label}</span>`;
    legendDiv.appendChild(item);
  });
}

buildFilters();
buildGrid();
buildLegend();
