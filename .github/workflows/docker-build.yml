name: "🐳 Docker Build Check"

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    name: Validate & Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Build backend image
        run: docker build -f backend/Dockerfile.dev -t openthai-backend:ci ./backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.dev -t openthai-frontend:ci ./frontend
