name: Validate Frontend

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML syntax
        run: |
          sudo apt-get install -y tidy
          tidy -errors -quiet -utf8 landing/index.html 2>&1 | grep -E "Error|Warning" | head -20 || true
          echo "✅ HTML validation complete"

      - name: Check file sizes
        run: |
          SIZE=$(wc -c < landing/index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ $SIZE -gt 500000 ]; then
            echo "⚠️ Warning: index.html is larger than 500KB"
          fi

      - name: Verify required files exist
        run: |
          for f in landing/index.html landing/privacy.html landing/robots.txt landing/sitemap.xml; do
            if [ ! -f "$f" ]; then echo "❌ Missing: $f"; exit 1; fi
            echo "✅ Found: $f"
          done
