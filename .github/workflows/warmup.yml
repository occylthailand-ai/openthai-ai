name: 🔥 Warmup & Health Watch

on:
  schedule:
    # ทุก 10 นาที — bypass Vercel Hobby cron limit (ซึ่งอนุญาตแค่วันละครั้ง)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # รันมือได้จาก GitHub Actions UI

env:
  PROD_URL: https://www.openthai-ai.com
  THRESHOLD_MS: 3000

jobs:
  warmup-and-health:
    name: 🌡️ Warmup Ping + Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🔥 Warmup ping (prevent cold start)
        id: warmup
        run: |
          echo "⏱️ $(date '+%Y-%m-%d %H:%M:%S UTC') — pinging warmup..."
          START=$(date +%s%3N)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ env.PROD_URL }}/api/warmup")

          END=$(date +%s%3N)
          ELAPSED=$((END - START))

          echo "warmup_status=$STATUS" >> $GITHUB_OUTPUT
          echo "warmup_ms=$ELAPSED"   >> $GITHUB_OUTPUT

          echo "📡 Warmup: HTTP $STATUS — ${ELAPSED}ms"

          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Warmup returned $STATUS (expected 200)"
          fi

      - name: ❤️ Health check
        id: health
        run: |
          echo "🏥 Running health check..."
          START=$(date +%s%3N)

          BODY=$(curl -s --max-time 10 "${{ env.PROD_URL }}/api/health")
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "parse_error")
          VERSION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','?'))" 2>/dev/null || echo "?")

          END=$(date +%s%3N)
          ELAPSED=$((END - START))

          echo "health_status=$STATUS"   >> $GITHUB_OUTPUT
          echo "health_ms=$ELAPSED"     >> $GITHUB_OUTPUT
          echo "health_version=$VERSION" >> $GITHUB_OUTPUT

          echo "❤️  Health: status=$STATUS version=$VERSION — ${ELAPSED}ms"

          # WARN ถ้า response > threshold
          if [ "$ELAPSED" -gt "${{ env.THRESHOLD_MS }}" ]; then
            echo "⚠️ SLOW RESPONSE: ${ELAPSED}ms > ${{ env.THRESHOLD_MS }}ms (cold start?)"
            echo "slow_response=true" >> $GITHUB_OUTPUT
          else
            echo "slow_response=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Report
        run: |
          echo "════════════════════════════════════"
          echo "🔥 Warmup  : HTTP ${{ steps.warmup.outputs.warmup_status }} — ${{ steps.warmup.outputs.warmup_ms }}ms"
          echo "❤️  Health  : ${{ steps.health.outputs.health_status }} v${{ steps.health.outputs.health_version }} — ${{ steps.health.outputs.health_ms }}ms"
          echo "════════════════════════════════════"

          # บันทึก result เพื่อ debug
          if [ "${{ steps.health.outputs.slow_response }}" == "true" ]; then
            echo "🚨 ALERT: Slow response detected — possible cold start"
            echo "   Consider upgrading to Vercel Pro for always-on compute"
          else
            echo "✅ All good — system healthy"
          fi

      - name: 🔔 LINE Notify (slow response only)
        if: steps.health.outputs.slow_response == 'true'
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              --data-urlencode "message=⚠️ OpenThai AI SLOW: ${{ steps.health.outputs.health_ms }}ms (threshold: ${{ env.THRESHOLD_MS }}ms) — $(date '+%H:%M UTC')"
            echo "📱 LINE notified"
          else
            echo "⏭️ LINE_NOTIFY_TOKEN not set — skipping LINE notify"
          fi

      - name: 🔔 Slack Notify (slow response)
        if: steps.health.outputs.slow_response == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HEALTH_MS: ${{ steps.health.outputs.health_ms }}
          HEALTH_VERSION: ${{ steps.health.outputs.health_version }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          THRESHOLD: ${{ env.THRESHOLD_MS }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python3 - <<'EOF'
import urllib.request, json, os
payload = json.dumps({
    "username": "OpenThai AI Bot",
    "icon_emoji": ":warning:",
    "text": f"⚠️ *OpenThai AI — Response ช้าผิดปกติ!* {os.environ['HEALTH_MS']}ms (threshold: {os.environ['THRESHOLD']}ms)",
    "attachments": [{
        "color": "#ECB22E",
        "fields": [
            {"title": "Response Time", "value": f"{os.environ['HEALTH_MS']}ms", "short": True},
            {"title": "Threshold", "value": f"{os.environ['THRESHOLD']}ms", "short": True},
            {"title": "Version", "value": os.environ["HEALTH_VERSION"], "short": True},
            {"title": "Run", "value": f"<{os.environ['GH_RUN_URL']}|View Run>", "short": True},
        ]
    }]
}).encode()
req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=payload, headers={"Content-Type": "application/json"})
urllib.request.urlopen(req)
print("Slack notified")
EOF

      - name: 🔔 Slack Notify (health check down)
        if: steps.warmup.outputs.warmup_status != '200'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WARMUP_STATUS: ${{ steps.warmup.outputs.warmup_status }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python3 - <<'EOF'
import urllib.request, json, os
payload = json.dumps({
    "username": "OpenThai AI Bot",
    "icon_emoji": ":rotating_light:",
    "text": f"🚨 *OpenThai AI — ระบบอาจมีปัญหา!* HTTP {os.environ['WARMUP_STATUS']} <{os.environ['GH_RUN_URL']}|ดู Log>",
    "attachments": [{
        "color": "#e01e5a",
        "fields": [
            {"title": "HTTP Status", "value": os.environ["WARMUP_STATUS"], "short": True},
            {"title": "Expected", "value": "200", "short": True},
        ]
    }]
}).encode()
req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=payload, headers={"Content-Type": "application/json"})
urllib.request.urlopen(req)
print("Slack notified")
EOF
