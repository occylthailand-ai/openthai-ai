name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 'lts/*'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run --reporter=verbose
        env:
          CI: true

      - name: Build check
        working-directory: frontend
        run: npm run build

  # ── 2. Security scan ───────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high || true

  # ── 3. Deploy Preview (PR only) ────────────────────────────────────────────
  deploy-preview:
    name: 🔍 Deploy Preview
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Deploy Production (main only) ──────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "⚠️  VERCEL_TOKEN not set — skipping Vercel deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check-secrets.outputs.skip == 'false'
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        if: steps.check-secrets.outputs.skip == 'false'
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check after deploy
        if: steps.check-secrets.outputs.skip == 'false'
        run: |
          sleep 15
          curl -f https://www.openthai-ai.com/api/health || exit 1
          echo "✅ Health check passed"

      - name: Notify LINE (success)
        if: steps.check-secrets.outputs.skip == 'false' && success()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=✅ OpenThai AI deployed successfully — $(date '+%Y-%m-%d %H:%M')"
          fi

      - name: Notify LINE (failure)
        if: steps.check-secrets.outputs.skip == 'false' && failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              -d "message=❌ Deploy FAILED — $(date '+%Y-%m-%d %H:%M') — Check GitHub Actions"
          fi

      - name: Notify Slack (success)
        if: steps.check-secrets.outputs.skip == 'false' && success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_ACTOR: ${{ github.actor }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python3 - <<'EOF'
import urllib.request, json, os
payload = json.dumps({
    "username": "OpenThai AI Bot",
    "icon_emoji": ":rocket:",
    "text": f"✅ *OpenThai AI — Deploy สำเร็จแล้ว!*",
    "attachments": [{
        "color": "#36a64f",
        "fields": [
            {"title": "Branch", "value": os.environ["GH_REF"], "short": True},
            {"title": "Actor", "value": os.environ["GH_ACTOR"], "short": True},
            {"title": "Commit", "value": os.environ["GH_SHA"][:7], "short": True},
            {"title": "Run", "value": f"<{os.environ['GH_RUN_URL']}|View Run>", "short": True},
        ]
    }]
}).encode()
req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=payload, headers={"Content-Type": "application/json"})
urllib.request.urlopen(req)
print("Slack notified")
EOF

      - name: Notify Slack (failure)
        if: steps.check-secrets.outputs.skip == 'false' && failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_ACTOR: ${{ github.actor }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python3 - <<'EOF'
import urllib.request, json, os
payload = json.dumps({
    "username": "OpenThai AI Bot",
    "icon_emoji": ":x:",
    "text": f"❌ *OpenThai AI — Deploy ล้มเหลว!* <{os.environ['GH_RUN_URL']}|ดู Log>",
    "attachments": [{
        "color": "#e01e5a",
        "fields": [
            {"title": "Branch", "value": os.environ["GH_REF"], "short": True},
            {"title": "Actor", "value": os.environ["GH_ACTOR"], "short": True},
            {"title": "Commit", "value": os.environ["GH_SHA"][:7], "short": True},
        ]
    }]
}).encode()
req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=payload, headers={"Content-Type": "application/json"})
urllib.request.urlopen(req)
print("Slack notified")
EOF

      - name: Skip notice
        if: steps.check-secrets.outputs.skip == 'true'
        run: |
          echo "ℹ️  ข้าม Vercel deploy เพราะยังไม่ได้ตั้ง GitHub Secrets"
          echo "   → ไปตั้งที่: GitHub repo → Settings → Secrets → Actions"
          echo "   → ต้องการ: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
