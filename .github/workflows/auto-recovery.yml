name: 🔧 Auto-Recovery (Self-Healing)

# ลูปกู้คืนอัตโนมัติ: ทำงานทันทีเมื่อ Health Watch ตรวจพบว่า production ล่ม
#   detect (health-watch) → heal (warm/retry ที่นี่) → escalate (เปิด issue + LINE)
on:
  workflow_run:
    workflows: ["❤️ Health Watch (24/7)"]
    types: [completed]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  PROD_URL: https://www.OpenThaiAi.com

jobs:
  self-heal:
    name: 🩹 Attempt Recovery
    # รันเฉพาะตอน Health Watch ล้มเหลว (หรือสั่งเองจาก UI)
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: 🔥 Warm + retry production (heal transient/cold-start)
        id: recover
        run: |
          echo "🔧 production ล่ม — เริ่มกู้คืนอัตโนมัติ..."
          for attempt in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${PROD_URL}/api/health" || echo 000)
            echo "  ครั้งที่ $attempt: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ กู้คืนสำเร็จในครั้งที่ $attempt (น่าจะเป็น cold start)"
              echo "recovered=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            SLEEP=$((attempt * 12))
            echo "     ยังไม่ขึ้น — รอ ${SLEEP}s แล้วลองใหม่..."
            sleep $SLEEP
          done
          echo "❌ กู้คืนไม่สำเร็จหลังลอง 5 ครั้ง — ต้องตรวจสอบด้วยมือ"
          echo "recovered=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: 🔔 LINE — recovered automatically
        if: success()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              --data-urlencode "message=✅ OpenThaiAi กู้คืนอัตโนมัติสำเร็จ ($(date -u '+%H:%M UTC'))"
          fi

      - name: 🚨 Escalate — open/refresh incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 Production incident — auto-recovery failed"
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY=$(printf '%s\n' \
            "Auto-recovery ลองกู้ \`${PROD_URL}\` 5 ครั้งแล้วไม่สำเร็จ — **ต้องตรวจสอบด้วยมือ**." \
            "" \
            "- เวลา: ${NOW}" \
            "- เช็ค: Vercel dashboard → Deployments / Functions logs" \
            "- เช็ค: \`${PROD_URL}/api/health\`" \
            "" \
            "_เปิดอัตโนมัติโดย Auto-Recovery workflow_")
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
                       --search "$TITLE in:title" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "↻ มี incident issue #$EXISTING อยู่แล้ว — เพิ่ม comment"
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "ยังล่มอยู่ ณ ${NOW} (auto-recovery ลองแล้วไม่สำเร็จ)"
          else
            echo "＋ เปิด incident issue ใหม่"
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY"
          fi

      - name: 🔔 LINE — escalation alert
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          if [ -n "$LINE_NOTIFY_TOKEN" ]; then
            curl -s -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_NOTIFY_TOKEN" \
              --data-urlencode "message=🚨 OpenThaiAi ล่ม — auto-recovery ไม่สำเร็จ เปิด GitHub issue แล้ว ต้องเช็คด่วน ($(date -u '+%H:%M UTC'))"
          fi
