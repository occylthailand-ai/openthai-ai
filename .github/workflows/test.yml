name: 🧪 Tests & Quality

on:
  push:
    branches: ['**']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend
        env:
          CI: true

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test 2>/dev/null || echo "No backend tests yet"
        working-directory: backend

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Check for console.log in production code
        run: |
          if grep -r "console\.log" frontend/src --include="*.jsx" --include="*.js" | grep -v "__tests__" | grep -v "// debug"; then
            echo "⚠️  Found console.log statements (warning only)"
          fi
      - name: Check for hardcoded secrets
        run: |
          if grep -rE "(api_key|apikey|secret|password)\s*=\s*['\"][a-zA-Z0-9]{20,}" frontend/src backend --include="*.js" --include="*.jsx" --include="*.ts"; then
            echo "❌ Potential hardcoded secret found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  notify-slack:
    name: 🔔 Notify Slack on Failure
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, lint]
    if: failure()
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_ACTOR: ${{ github.actor }}
          GH_REF: ${{ github.ref_name }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          python3 - <<'EOF'
import urllib.request, json, os
payload = json.dumps({
    "username": "OpenThai AI Bot",
    "icon_emoji": ":x:",
    "text": f"❌ *OpenThai AI — Tests/Lint ล้มเหลว!* <{os.environ['GH_RUN_URL']}|ดู Log>",
    "attachments": [{
        "color": "#e01e5a",
        "fields": [
            {"title": "Branch", "value": os.environ["GH_REF"], "short": True},
            {"title": "Actor", "value": os.environ["GH_ACTOR"], "short": True},
        ]
    }]
}).encode()
req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=payload, headers={"Content-Type": "application/json"})
urllib.request.urlopen(req)
print("Slack notified")
EOF
