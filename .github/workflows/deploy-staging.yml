name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy-staging-frontend:
    name: Frontend → Vercel Preview
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build (staging env)
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}
          VITE_ENV: staging

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN

      - name: Health Check Staging Frontend
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_URL }} || echo "⚠️ Staging frontend health check warning"

  deploy-staging-backend:
    name: Backend → Railway Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Staging
        run: railway up --service openthai-backend-staging
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: sleep 20

      - name: Health check backend staging
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_API_URL }}/health)
          echo "Staging backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Staging backend health check failed — status $STATUS"
            exit 1
          fi

  notify-staging:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy-staging-frontend, deploy-staging-backend]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy-staging-frontend.result == 'success' && needs.deploy-staging-backend.result == 'success'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"✅ *Staging Deploy สำเร็จ* — '${{ github.sha }}' by '${{ github.actor }}'\n🌐 Frontend: '${{ secrets.STAGING_URL }}'\n🔧 API: '${{ secrets.STAGING_API_URL }}'"}'

      - name: Notify failure
        if: needs.deploy-staging-frontend.result == 'failure' || needs.deploy-staging-backend.result == 'failure'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"❌ *Staging Deploy ล้มเหลว* — '${{ github.sha }}' by '${{ github.actor }}'\nตรวจสอบ GitHub Actions ด่วน"}'
