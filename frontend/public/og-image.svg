<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080812"/>
      <stop offset="50%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fe2c55"/>
      <stop offset="50%" stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fe2c55" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="200" r="300" fill="#fe2c55" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1000" cy="400" r="280" fill="#6366f1" opacity="0.08" filter="url(#glow)"/>

  <!-- Badge pill -->
  <rect x="80" y="72" width="300" height="44" rx="22" fill="url(#pill)" stroke="#fe2c55" stroke-opacity="0.4" stroke-width="1"/>
  <text x="230" y="100" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#fca5a5" text-anchor="middle">🇹🇭 AI ไทยแท้ • OpenThai AI</text>

  <!-- Main headline -->
  <text x="80" y="200" font-family="Arial,'Sarabun',sans-serif" font-size="72" font-weight="900" fill="white">สร้างคอนเทนต์ TikTok</text>
  <text x="80" y="290" font-family="Arial,sans-serif" font-size="72" font-weight="900">
    <tspan fill="url(#accent)">ปังใน 10 วินาที</tspan>
  </text>

  <!-- Sub text -->
  <text x="80" y="360" font-family="Arial,sans-serif" font-size="28" fill="#94a3b8">ไม่ต้องคิดสคริปต์ • ไม่ต้องเขียนแคปชั่น • ไม่ต้องหาแฮชแท็ก</text>

  <!-- Stats row -->
  <g transform="translate(80, 420)">
    <!-- Stat 1 -->
    <rect width="180" height="80" rx="12" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text x="90" y="38" font-family="Arial,sans-serif" font-size="30" font-weight="900" fill="#fe2c55" text-anchor="middle">1,200+</text>
    <text x="90" y="62" font-family="Arial,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Creator ใช้แล้ว</text>
    <!-- Stat 2 -->
    <rect x="196" width="160" height="80" rx="12" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text x="276" y="38" font-family="Arial,sans-serif" font-size="30" font-weight="900" fill="#10b981" text-anchor="middle">3x</text>
    <text x="276" y="62" font-family="Arial,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">คอนเทนต์โตไว</text>
    <!-- Stat 3 -->
    <rect x="372" width="160" height="80" rx="12" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <text x="452" y="38" font-family="Arial,sans-serif" font-size="30" font-weight="900" fill="#6366f1" text-anchor="middle">ฟรี</text>
    <text x="452" y="62" font-family="Arial,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">3 ครั้ง/วัน</text>
  </g>

  <!-- CTA -->
  <rect x="80" y="530" width="340" height="64" rx="32" fill="url(#accent)"/>
  <text x="250" y="571" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">ใช้ฟรีวันนี้ → openthai-ai.com</text>

  <!-- Right side: mock UI card -->
  <g transform="translate(680, 80)">
    <rect width="440" height="470" rx="20" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <!-- Window chrome -->
    <rect width="440" height="44" rx="20" fill="black" fill-opacity="0.3"/>
    <rect y="20" width="440" height="24" fill="black" fill-opacity="0.3"/>
    <circle cx="24" cy="22" r="7" fill="#fe2c55"/>
    <circle cx="46" cy="22" r="7" fill="#f59e0b"/>
    <circle cx="68" cy="22" r="7" fill="#10b981"/>
    <text x="220" y="28" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="middle">AI Generator — ผ้าไหมอุบล</text>
    <!-- Content rows -->
    <g transform="translate(20, 64)">
      <rect width="400" height="72" rx="10" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
      <text x="14" y="22" font-family="Arial,sans-serif" font-size="11" fill="#475569" font-weight="700">🎣 HOOK</text>
      <text x="14" y="44" font-family="Arial,sans-serif" font-size="14" fill="#cbd5e1">ทำไมผ้าไหมอุบลถึงแพงกว่าที่อื่น?</text>
      <text x="14" y="62" font-family="Arial,sans-serif" font-size="14" fill="#cbd5e1">เฉลยตอนท้าย!</text>
    </g>
    <g transform="translate(20, 152)">
      <rect width="400" height="90" rx="10" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
      <text x="14" y="22" font-family="Arial,sans-serif" font-size="11" fill="#475569" font-weight="700">📝 CAPTION</text>
      <text x="14" y="44" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">✨ ผ้าไหมอุบล — สิ่งทอไทย UNESCO</text>
      <text x="14" y="62" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">💰 ราคาพิเศษ • 🚚 ส่งฟรีทั่วไทย</text>
      <text x="14" y="80" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">📩 DM หรือกดลิงก์ใน Bio</text>
    </g>
    <g transform="translate(20, 258)">
      <rect width="190" height="72" rx="10" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
      <text x="95" y="28" font-family="Arial,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">AI SCORE</text>
      <text x="95" y="58" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="#10b981" text-anchor="middle">9.2</text>
    </g>
    <g transform="translate(226, 258)">
      <rect width="194" height="72" rx="10" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="97" y="28" font-family="Arial,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">PLATFORM</text>
      <text x="97" y="56" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#a5b4fc" text-anchor="middle">TikTok</text>
    </g>
    <!-- hashtags -->
    <g transform="translate(20, 348)">
      <text x="0" y="18" font-family="Arial,sans-serif" font-size="11" fill="#475569" font-weight="700">#️⃣ HASHTAGS</text>
      <rect y="26" width="96" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="48" y="44" font-family="Arial,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">#ผ้าไหม</text>
      <rect x="106" y="26" width="72" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="142" y="44" font-family="Arial,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">#OTOP</text>
      <rect x="188" y="26" width="100" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="238" y="44" font-family="Arial,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">#สินค้าไทย</text>
      <rect x="298" y="26" width="102" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
      <text x="349" y="44" font-family="Arial,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">#TikTokShop</text>
    </g>
    <!-- generate button -->
    <rect x="20" y="410" width="400" height="46" rx="23" fill="url(#accent)"/>
    <text x="220" y="439" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">⚡ Generate ใหม่</text>
  </g>
</svg>
