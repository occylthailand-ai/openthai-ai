<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- Main gradient: purple → indigo -->
    <linearGradient id="grad_main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Glow gradient for emblem -->
    <radialGradient id="grad_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold accent -->
    <linearGradient id="grad_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="grad_text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <!-- Clip for emblem -->
    <clipPath id="hex_clip">
      <polygon points="40,6 68,22 68,58 40,74 12,58 12,22"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Emblem (hexagon) ── -->
  <!-- Outer glow -->
  <circle cx="40" cy="40" r="38" fill="url(#grad_glow)"/>

  <!-- Hexagon body -->
  <polygon points="40,4 70,22 70,58 40,76 10,58 10,22"
           fill="url(#grad_main)" filter="url(#shadow)"/>

  <!-- Inner hex border -->
  <polygon points="40,10 64,24 64,56 40,70 16,56 16,24"
           fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Thai-inspired lotus petals (top) -->
  <g clip-path="url(#hex_clip)">
    <!-- Center circle AI core -->
    <circle cx="40" cy="40" r="16" fill="rgba(255,255,255,0.12)"/>
    <circle cx="40" cy="40" r="10" fill="rgba(255,255,255,0.18)"/>

    <!-- Lotus petals -->
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.3)" transform="rotate(0,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(45,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(90,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(135,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.3)" transform="rotate(180,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(225,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(270,40,40)"/>
    <ellipse cx="40" cy="26" rx="5" ry="10" fill="rgba(255,255,255,0.2)" transform="rotate(315,40,40)"/>

    <!-- AI circuit dots -->
    <circle cx="40" cy="24" r="2.5" fill="url(#grad_gold)"/>
    <circle cx="56" cy="40" r="2.5" fill="url(#grad_gold)"/>
    <circle cx="24" cy="40" r="2.5" fill="url(#grad_gold)"/>
    <circle cx="40" cy="56" r="2.5" fill="url(#grad_gold)"/>

    <!-- Circuit lines -->
    <line x1="40" y1="30" x2="40" y2="24" stroke="rgba(251,191,36,0.6)" stroke-width="1.5"/>
    <line x1="50" y1="40" x2="56" y2="40" stroke="rgba(251,191,36,0.6)" stroke-width="1.5"/>
    <line x1="30" y1="40" x2="24" y2="40" stroke="rgba(251,191,36,0.6)" stroke-width="1.5"/>
    <line x1="40" y1="50" x2="40" y2="56" stroke="rgba(251,191,36,0.6)" stroke-width="1.5"/>

    <!-- Letter อ (Thai "Or-Ang") stylized in center -->
    <text x="40" y="46"
          font-family="serif" font-size="18" font-weight="900"
          fill="white" text-anchor="middle" dominant-baseline="middle"
          letter-spacing="-1">อ</text>
  </g>

  <!-- Hex outline -->
  <polygon points="40,4 70,22 70,58 40,76 10,58 10,22"
           fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- ── Wordmark ── -->
  <!-- "Open" -->
  <text x="88" y="32"
        font-family="'Inter', 'Arial', sans-serif"
        font-size="20" font-weight="800" letter-spacing="-0.5"
        fill="url(#grad_text)">Open</text>

  <!-- "Thai" — gold accent -->
  <text x="88" y="56"
        font-family="'Inter', 'Arial', sans-serif"
        font-size="20" font-weight="800" letter-spacing="-0.5"
        fill="url(#grad_gold)">Thai</text>

  <!-- " AI" after Thai on same line -->
  <text x="140" y="56"
        font-family="'Inter', 'Arial', sans-serif"
        font-size="20" font-weight="800" letter-spacing="-0.5"
        fill="url(#grad_text)"> AI</text>

  <!-- Tagline -->
  <text x="88" y="70"
        font-family="'Inter', 'Arial', sans-serif"
        font-size="9" font-weight="500" letter-spacing="1.5"
        fill="rgba(165,180,252,0.7)">CONTENT · COMMERCE · AI</text>
</svg>
