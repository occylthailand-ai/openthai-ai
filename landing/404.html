<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — OpenThai AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #FF6B35; --dark: #1A1A2E; --gradient: linear-gradient(135deg,#FF6B35,#FF8E53); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: #F7F7F7;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; text-align: center;
    }
    .wrap { max-width: 480px; }
    .big { font-size: 6rem; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--dark); margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; line-height: 1.7; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 0.75rem 1.75rem; border-radius: 12px;
      text-decoration: none; font-weight: 700; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--gradient); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.35); }
    .btn-outline { border: 2px solid #e0e0e0; color: #666; background: white; }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="big">404</div>
  <h1>ไม่พบหน้านี้</h1>
  <p>หน้าที่คุณต้องการไม่มีอยู่ หรืออาจถูกย้ายไปแล้ว<br>ลองกลับไปหน้าแรกหรือไปใช้ AI Generator ได้เลยครับ</p>
  <div class="links">
    <a href="generator.html" class="btn btn-primary">🚀 AI Generator</a>
    <a href="index.html" class="btn btn-outline">← หน้าแรก</a>
  </div>
</div>
</body>
</html>
